name: XYZW
options:
  bundleIdPrefix: com.xyzw
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UIStatusBarHidden: false
    INFOPLIST_KEY_NSAppTransportSecurity:
      NSAllowsLocalNetworking: true
      NSAllowsArbitraryLoads: false

targets:
  XYZW:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: dist
        type: folder
        buildPhase: resources
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xyzw.game
        INFOPLIST_KEY_CFBundleDisplayName: XYZW游戏管理
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
